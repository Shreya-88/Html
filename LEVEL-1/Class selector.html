<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class selector</title>
    <style>
        #first { color:red; }
        .second { color: green; }
    </style>
</head>
<body>
    <div id="first">heading</div>
    <div class="second">second heading</div>
    <div class="second">second heading(i)</div>
</body>
</html>
