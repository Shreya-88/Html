<!DOCTYPE html>

<head>

    <title>Margin property</title>

        *{margin: 2; border: 6;padding: 9;}
        #button1{
            margin: 5px 2px 5px 18px;
            padding: 10px;
            background-color: aqua;

</head>

    <button id="button1">Click here</button>
</body>
