<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        .box {
            margin: 5px;
            height: 50px;
            width: 25px;
        }
        #box1 {
            position: static;
            bottom: 100px;
            right: 100px;
            background-color: cornflowerblue;
            height: 100px;
            width: 100px;
        }
        #box2 {
            position: relative;
            top: 5px;
            left: 50px;
            background-color: blueviolet;
            height: 80px;
            width: 80px;
        }
        #box3 {
            position: fixed;
            top: 5px;
            right: 5px;
            background-color: cadetblue;
            height: 60px;
            width: 90px;
        }  
        #box4 {
            position: absolute;
            bottom: 60px;
            right: 60px;
            background-color: chartreuse;
            height: 100px;
            width: 100px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">box1</div>
    <div id="box2" class="box">box2</div>
    <div id="box3" class="box">box3</div>
    <div id="box4" class="box">box4</div>
</body>
</html>
