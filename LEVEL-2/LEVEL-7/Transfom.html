<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
    <style>
        .box {
            height: 70px;
            width: 70px;
            background-color: plum;
            border: 2px solid black;
            border-radius: 5px;
            position: relative;
            top: 50px;
            left: 50px;

            transition: all 0.5s ease-in;
        }
        .box:hover {
            transform: skew(180deg);
           
        }
    </style>
</head>
<body>
    <div class="box">Tanslate</div>
    
</body>
</html>
